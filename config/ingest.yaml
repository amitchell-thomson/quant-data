# EODHD Ingestion Configuration
# This file defines the paths, universes, and behavior for data ingestion

# Root directory for all market data (absolute or relative to project root)
data_root: "/Users/alecmitchell-thomson/Desktop/Coding/quant-data"

# Date ranges for historical data ingestion
# Use "earliest" to pull from the beginning of available history
date_ranges:
  default_start: "1985-01-01" # Fallback if no specific range provided
  default_end: null # null = today

# Universe definition
universe:
  sp500:
    index_code: "GSPC.INDX" # EODHD code for S&P 500
    exchanges:
      - NYSE
      - NASDAQ
      - AMEX
    membership_file: "equities/index_membership/sp500.parquet"

# API configuration
api:
  # EODHD API (for equities data)
  eodhd:
    base_url: "https://eodhd.com/api"
    timeout: 30 # seconds
    max_retries: 3
    retry_backoff_factor: 2.0 # exponential backoff: 2, 4, 8, 16, 32 seconds
    rate_limit:
      requests_per_second: 10 # Conservative limit
      burst_size: 20

  # FRED API (for macro data)
  fred:
    base_url: "https://api.stlouisfed.org/fred"
    timeout: 30
    max_retries: 3
    retry_backoff_factor: 2.0
    rate_limit:
      requests_per_minute: 120 # FRED's rate limit

  # Legacy fields for backward compatibility
  base_url: "https://eodhd.com/api"
  timeout: 30
  max_retries: 3
  retry_backoff_factor: 2.0
  rate_limit:
    requests_per_second: 10
    burst_size: 20

# Concurrency settings
concurrency:
  max_workers: 5 # Parallel ticker downloads
  batch_size: 50 # Tickers per batch for logging

# Data quality & processing
processing:
  deduplicate: true
  validate_schema: true
  handle_delisted_suffix: true # Strip .US_old -> .US for consistency
  fill_missing_exchanges: true # Infer exchange from ticker if missing

# Ingestion log settings
logging:
  ingestion_log_path: "_meta/ingestion-log.parquet"
  ticker_mapping_path: "_meta/ticker-mapping.parquet"
  schema_versions_path: "_meta/schema-versions"
  log_level: "INFO" # DEBUG, INFO, WARNING, ERROR
  progress_bar: true

# Dataset-specific settings
datasets:
  ohlcv:
    output_path: "equities/ohlcv/daily"
    partition_by: "exchange" # Create subdirs by exchange
    min_required_fields: ["date", "open", "high", "low", "close", "volume"]

  corporate_actions:
    dividends_path: "equities/corporate-actions/dividends.parquet"
    splits_path: "equities/corporate-actions/splits.parquet"

  fundamentals:
    annual_path: "equities/fundamentals/annual"
    quarterly_path: "equities/fundamentals/quarterly"
    ratios_path: "equities/fundamentals/ratios"
    shares_outstanding_path: "equities/fundamentals/shares-outstanding"
    classifications_path: "equities/fundamentals/classifications"
    # Which sections to pull from EODHD fundamentals endpoint
    sections:
      - Financials
      - Highlights
      - Valuation
      - SharesStats
      - Technicals
      - SplitsDividends
      - AnalystRatings
      - Holders
      - ESGScores

  macro:
    rates_path: "macro/rates"
    inflation_path: "macro/inflation"
    growth_path: "macro/growth"
    employment_path: "macro/employment"
    calendars_path: "macro/calendars"
    # Define FRED series to ingest (800,000+ series available)
    # Find series at https://fred.stlouisfed.org/
    series:
      # ============================
      # Interest Rates, Curve & Credit
      # ============================
      - code: "DGS3MO"
        name: "us_3m_treasury"
        category: "rates"
        description: "3-month US Treasury yield; short-term risk-free rate and proxy for monetary policy stance."

      - code: "DGS2"
        name: "us_2y_treasury"
        category: "rates"
        description: "2-year US Treasury yield; captures near-term policy expectations."

      - code: "DGS5"
        name: "us_5y_treasury"
        category: "rates"
        description: "5-year US Treasury yield; reflects medium-term growth and inflation expectations."

      - code: "DGS10"
        name: "us_10y_treasury"
        category: "rates"
        description: "10-year US Treasury yield; benchmark long-term rate capturing growth and inflation outlook."

      - code: "DGS30"
        name: "us_30y_treasury"
        category: "rates"
        description: "30-year US Treasury yield; proxy for long-run inflation expectations and term premium."

      - code: "T10Y2Y"
        name: "10y_2y_spread"
        category: "rates"
        description: "Yield curve slope between 10-year and 2-year Treasuries; classic recession indicator."

      - code: "T10Y3M"
        name: "10y_3m_spread"
        category: "rates"
        description: "Yield curve slope between 10-year and 3-month Treasuries; strong predictor of economic downturns."

      - code: "FEDFUNDS"
        name: "federal_funds_rate"
        category: "rates"
        description: "Effective federal funds rate; the primary US monetary policy rate."

      - code: "MORTGAGE30US"
        name: "30y_mortgage_rate"
        category: "rates"
        description: "Average 30-year fixed mortgage rate; key transmission channel of monetary policy to the real economy."

      - code: "AAA"
        name: "aaa_corporate_bond_yield"
        category: "rates"
        description: "Yield on AAA-rated corporate bonds; high-quality corporate borrowing cost."

      - code: "BAA"
        name: "baa_corporate_bond_yield"
        category: "rates"
        description: "Yield on BAA-rated corporate bonds; lower-quality credit borrowing cost."

      - code: "BAA10Y"
        name: "baa_10y_spread"
        category: "rates"
        description: "Spread between BAA corporate yields and 10-year Treasuries; indicator of credit stress."

      - code: "BAMLH0A0HYM2"
        name: "high_yield_spread"
        category: "rates"
        description: "High-yield corporate bond spread over Treasuries; proxy for risk appetite and financial stress."

      # ============================
      # Inflation & Inflation Expectations
      # ============================
      - code: "CPIAUCSL"
        name: "cpi_all_urban"
        category: "inflation"
        description: "Headline consumer price index for all urban consumers; broad inflation measure."

      - code: "CPILFESL"
        name: "cpi_core"
        category: "inflation"
        description: "Core CPI excluding food and energy; measures underlying inflation trends."

      - code: "PCEPI"
        name: "pce_price_index"
        category: "inflation"
        description: "Personal Consumption Expenditures price index; the Fed’s preferred inflation gauge."

      - code: "PCEPILFE"
        name: "pce_core"
        category: "inflation"
        description: "Core PCE excluding food and energy; key indicator for monetary policy decisions."

      - code: "PPIACO"
        name: "ppi_all_commodities"
        category: "inflation"
        description: "Producer Price Index for All Commodities; measures average changes in selling prices received by domestic producers, a leading indicator of pipeline inflation."

      - code: "T5YIE"
        name: "5y_breakeven_inflation"
        category: "inflation"
        description: "5-year breakeven inflation rate; market-implied medium-term inflation expectations."

      - code: "T10YIE"
        name: "10y_breakeven_inflation"
        category: "inflation"
        description: "10-year breakeven inflation rate; long-term inflation expectations priced by markets."

      - code: "T5YIFR"
        name: "5y5y_forward_inflation"
        category: "inflation"
        description: "5-year, 5-year forward inflation expectation; isolates long-run inflation credibility."

      # ============================
      # Growth, Activity & Risk Sentiment
      # ============================
      - code: "GDP"
        name: "us_gdp"
        category: "growth"
        description: "Nominal US gross domestic product; total economic output."

      - code: "GDPC1"
        name: "real_gdp"
        category: "growth"
        description: "Inflation-adjusted US GDP; core measure of real economic growth."

      - code: "GDPPOT"
        name: "potential_gdp"
        category: "growth"
        description: "Estimated potential GDP; used to infer output gaps and economic slack."

      - code: "INDPRO"
        name: "industrial_production"
        category: "growth"
        description: "Industrial production index; high-frequency indicator of cyclical activity."

      - code: "CFNAI"
        name: "chicago_fed_national_activity_index"
        category: "growth"
        description: "Composite index of economic activity; designed explicitly for business-cycle detection."

      - code: "UMCSENT"
        name: "consumer_sentiment_michigan"
        category: "growth"
        description: "University of Michigan consumer sentiment index; demand-side confidence indicator."

      - code: "DCOILWTICO"
        name: "wti_crude_oil"
        category: "growth"
        description: "WTI crude oil spot price; proxy for global growth, inflation pressure, and geopolitics."

      - code: "GS10"
        name: "gold_price"
        category: "growth"
        description: "Gold price; hedge against inflation and indicator of risk aversion."

      - code: "VIXCLS"
        name: "vix_volatility_index"
        category: "growth"
        description: "CBOE VIX index; market-implied equity volatility and uncertainty."

      # ============================
      # Employment & Labour Market
      # ============================
      - code: "UNRATE"
        name: "unemployment_rate"
        category: "employment"
        description: "Headline unemployment rate; lagging but regime-confirming labour market indicator."

      - code: "U6RATE"
        name: "u6_unemployment"
        category: "employment"
        description: "Broad unemployment measure including underemployment; labour market slack indicator."

      - code: "PAYEMS"
        name: "nonfarm_payrolls"
        category: "employment"
        description: "Total nonfarm payroll employment; core labour market growth signal."

      - code: "ICSA"
        name: "initial_jobless_claims"
        category: "employment"
        description: "Weekly initial jobless claims; leading indicator of labour market stress."

      - code: "CIVPART"
        name: "labor_force_participation"
        category: "employment"
        description: "Labour force participation rate; structural labour market dynamics."

      - code: "AHETPI"
        name: "avg_hourly_earnings"
        category: "employment"
        description: "Average hourly earnings; wage inflation and labour cost pressure."

      - code: "JTSJOL"
        name: "job_openings"
        category: "employment"
        description: "JOLTS job openings; indicator of labour market tightness."

      # ============================
      # Liquidity & Financial Conditions
      # ============================
      - code: "WALCL"
        name: "fed_balance_sheet"
        category: "liquidity"
        description: "Total assets on the Federal Reserve balance sheet; proxy for liquidity conditions."

      - code: "M2SL"
        name: "money_supply_m2"
        category: "liquidity"
        description: "M2 money supply; broad measure of system liquidity."

      - code: "NFCI"
        name: "chicago_fed_financial_conditions"
        category: "liquidity"
        description: "Chicago Fed National Financial Conditions Index; aggregate measure of financial stress."
